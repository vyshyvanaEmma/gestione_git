<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monumenti di Roma</title>
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="div-center">
        <h1 class="main-title">MONUMENTI DI ROMA</h1>
    </div>
    <div id="map" style="height: 500px; width: 100%;"></div>
    <a class="wiki-link" href="https://it.wikipedia.org/wiki/Roma" target="_blank">Vai alla pagina Wikipedia di Roma</a>

    <div class="div-center">
        <button id="btn-tabella">Mostra Tabella Monumenti</button>
    </div>
    <div class="table-center">
        <div id="container-tabella" ></div>
    </div>
    <section id="form-container">
        <h2>Aggiungi Monumento</h2>
        <form id="monumento-form">
            <input type="text" id="nome" placeholder="Nome Monumento" required>
            <input type="number" step="any" id="lat" placeholder="Latitudine" required>
            <input type="number" step="any" id="lng" placeholder="Longitudine" required>
            <button type="submit">Aggiungi sulla Mappa</button>
        </form>
    </section>


    <button id="btn-statistiche">Mostra Statistiche</button>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin="">
    </script>

    <script src="monumenti.js"></script>
    <script src="script.js"></script>
</body>
</html>
